description: >-
  FOCUS-aligned FinOps for ItsaCheckmate: a flat per-location monthly
  subscription for delivery/order-channel integration, with the number of
  connected ordering services determining the tier and additional solutions
  quoted separately.
sources:
  - https://support.itsacheckmate.com/hc/en-us/articles/8105450179867-Checkmate-Pricing
  - https://www.itsacheckmate.com/pricing
  - https://www.itsacheckmate.com/solutions/marketplace-for-developers
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ItsaCheckmate, Inc.
serviceCategory: Restaurant Technology + Order Integration
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
focusColumns:
  ServiceName: ItsaCheckmate
  ServiceCategory: Restaurant Technology + Order Integration
  ProviderName: ItsaCheckmate
  PublisherName: ItsaCheckmate, Inc.
  InvoiceIssuerName: ItsaCheckmate, Inc.
  BillingCurrency: USD
meters:
  - name: location_subscription
    unit: month
    aggregation: sum
    dimensions:
      - location
      - service_tier
  - name: connected_services
    unit: varies
    aggregation: max
    dimensions:
      - location
      - ordering_platform
  - name: additional_solutions
    unit: month
    aggregation: sum
    dimensions:
      - location
      - solution
principles:
  - name: Visibility
    description: >-
      Track spend by counting active locations and their service tier ($85 for
      up to two services, $100 for unlimited) on the monthly Checkmate invoice;
      Checkmate's consolidated reporting surface shows order volume per platform
      per location.
  - name: Allocation
    description: >-
      Attribute cost to each restaurant location and ordering platform using the
      location and ordering_platform dimensions, enabling per-brand and
      per-venue cost rollups for multi-unit and ghost-kitchen operators.
  - name: Optimization
    description: >-
      Right-size the per-location tier by consolidating low-volume ordering
      platforms, and avoid the unlimited tier where a location uses two or fewer
      services; renegotiate custom-quoted Direct Ordering and Reconcile add-ons
      against realized volume.
  - name: Accountability
    description: >-
      Month-to-month contracts with no setup fee let an operations owner add or
      remove locations as the footprint changes; review the location count each
      billing cycle against the active-location list.
