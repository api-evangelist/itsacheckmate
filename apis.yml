aid: itsacheckmate
name: ItsaCheckmate
description: >-
  ItsaCheckmate (Checkmate) is restaurant middleware that connects point-of-sale systems to delivery marketplaces and
  ordering channels, providing two-way integration, menu management, and consolidated reporting across 50+ POS systems
  and 100+ ordering platforms for tens of thousands of restaurant locations. Through its Marketplace for Developers,
  Checkmate offers a self-service open REST API that lets technology partners build a single integration to read and
  write menus, orders, and locations across many POS systems. The API uses OAuth-style token authentication with
  short-lived, scoped access and refresh tokens, ready-to-use Postman collections, and an llms.txt index for AI agents.
