apis:
  - aid: itsacheckmate:rest-api
    name: Marketplace for Developers API
    description: >-
      An open REST API that lets developers build one integration and read and write menus, orders, and locations across
      50+ POS systems. Resources include location activation, menu retrieval, single and group order submission, special
      hours and closures, and token management. Authentication uses OAuth-style short-lived, scoped access tokens with
      refresh tokens, defaulting to 24-hour token expiry.
