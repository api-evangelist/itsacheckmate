naftiko: 1.0.0-alpha2
info:
  label: ItsaCheckmate Marketplace for Developers API — OAuth
  description: 'OAuth surface of the ItsaCheckmate Marketplace for Developers API. 2 operations. Lead operation: ItsaCheckmate Create or Refresh Token. Self-contained Naftiko capability covering one ItsaCheckmate business surface.'
  tags:
  - ItsaCheckmate
  - OAuth
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    ITSACHECKMATE_ACCESS_TOKEN: ITSACHECKMATE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketplace-api-oauth
    baseUri: https://sandbox-api.itsacheckmate.com
    description: ItsaCheckmate Marketplace for Developers API — OAuth business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.ITSACHECKMATE_ACCESS_TOKEN}}'
    resources:
    - name: oauth-token
      path: /oauth/token
      operations:
      - name: createToken
        method: POST
        description: ItsaCheckmate Create or Refresh Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
          description: Request payload.
    - name: oauth-token-info
      path: /oauth/token/info
      operations:
      - name: getTokenDetails
        method: GET
        description: ItsaCheckmate Get Token Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: marketplace-api-oauth-rest
    port: 8080
    description: REST adapter for ItsaCheckmate Marketplace for Developers API — OAuth. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/oauth-token
      name: oauth-token
      description: REST surface for oauth-token.
      operations:
      - method: POST
        name: createToken
        description: ItsaCheckmate Create or Refresh Token
        call: marketplace-api-oauth.createToken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/oauth-token-info
      name: oauth-token-info
      description: REST surface for oauth-token-info.
      operations:
      - method: GET
        name: getTokenDetails
        description: ItsaCheckmate Get Token Details
        call: marketplace-api-oauth.getTokenDetails
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-api-oauth-mcp
    port: 9090
    transport: http
    description: MCP adapter for ItsaCheckmate Marketplace for Developers API — OAuth. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: create-token
      description: ItsaCheckmate Create or Refresh Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketplace-api-oauth.createToken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-token-details
      description: ItsaCheckmate Get Token Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-api-oauth.getTokenDetails
      outputParameters:
      - type: object
        mapping: $.
