naftiko: 1.0.0-alpha2
info:
  label: ItsaCheckmate Marketplace for Developers API — Locations
  description: 'Locations surface of the ItsaCheckmate Marketplace for Developers API. 2 operations. Lead operation: ItsaCheckmate Activate Location. Self-contained Naftiko capability covering one ItsaCheckmate business surface.'
  tags:
  - ItsaCheckmate
  - Locations
  created: '2026-06-02'
  modified: '2026-06-02'
binds:
- namespace: env
  keys:
    ITSACHECKMATE_ACCESS_TOKEN: ITSACHECKMATE_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: marketplace-api-locations
    baseUri: https://sandbox-api.itsacheckmate.com
    description: ItsaCheckmate Marketplace for Developers API — Locations business capability. Self-contained, no shared references.
    authentication:
      type: bearer
      token: '{{env.ITSACHECKMATE_ACCESS_TOKEN}}'
    resources:
    - name: activate
      path: /api/v2/activate
      operations:
      - name: activateLocation
        method: GET
        description: ItsaCheckmate Activate Location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accept
          in: header
          type: string
          required: false
          description: Response media type. Defaults to application/json.
    - name: get-location
      path: /api/v2/get_location
      operations:
      - name: getLocation
        method: GET
        description: ItsaCheckmate Get Location
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accept
          in: header
          type: string
          required: false
          description: Response media type. Defaults to application/json.
  exposes:
  - type: rest
    namespace: marketplace-api-locations-rest
    port: 8080
    description: REST adapter for ItsaCheckmate Marketplace for Developers API — Locations. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/activate
      name: activate
      description: REST surface for activate.
      operations:
      - method: GET
        name: activateLocation
        description: ItsaCheckmate Activate Location
        call: marketplace-api-locations.activateLocation
        with:
          accept: rest.accept
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/get-location
      name: get-location
      description: REST surface for get-location.
      operations:
      - method: GET
        name: getLocation
        description: ItsaCheckmate Get Location
        call: marketplace-api-locations.getLocation
        with:
          accept: rest.accept
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-api-locations-mcp
    port: 9090
    transport: http
    description: MCP adapter for ItsaCheckmate Marketplace for Developers API — Locations. One tool per consumed operation, routed inline through this capability's consumes block.
    tools:
    - name: activate-location
      description: ItsaCheckmate Activate Location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-api-locations.activateLocation
      with:
        accept: tools.accept
      outputParameters:
      - type: object
        mapping: $.
    - name: get-location
      description: ItsaCheckmate Get Location
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-api-locations.getLocation
      with:
        accept: tools.accept
      outputParameters:
      - type: object
        mapping: $.
